services:
  # ── Backend Service ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=student-db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-appdb}
      - DB_USER=${POSTGRES_USER:-appuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-apppassword}
    networks:
      app_net:
        ipv4_address: 172.28.0.3
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Database Service ─────────────────────────────────────────
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: student-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_USER=${POSTGRES_USER:-appuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-apppassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      app_net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

# ── Named Volume ─────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────
# Using a custom bridge network with fixed IPs for Docker Desktop
# The macvlan network (app_macvlan) is created separately via
# create-network.sh for demonstration/assignment purposes
networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
